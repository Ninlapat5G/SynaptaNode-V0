; SynaptaNode v3 — ESP-IDF framework (required for real MQTT 5)
; หมายเหตุ: example นี้ใช้ mock sensor (return ค่าคงที่)
; เพราะ DHT Arduino library ไม่รองรับ ESP-IDF framework

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = espidf
monitor_speed = 115200
lib_deps  =
    https://github.com/Ninlapat5G/SynaptaNode.git
